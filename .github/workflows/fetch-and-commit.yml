name: Fetch and Commit
on:
  workflow_dispatch:
jobs:
  run_commit_api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Thoughtspot_commit branch
        uses: actions/checkout@v4
        with:
          ref: Thoughtspot_commit  # Your branch name
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install dependencies
        run: pip install -r requirements.txt || pip install requests pandas python-dotenv
      - name: Run commit.py
        run: python commit.py