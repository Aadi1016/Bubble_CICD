name: Fetch and Commit

on:    
  # Allow triggering manually
  workflow_dispatch:

env:
  CS_TOOLS_COMMIT: 91acb5c2411c5d3d8b1bce6ac0e6c4d30e003827
  CS_TOOLS_THOUGHTSPOT__URL: ${{ secrets.DEV_THOUGHTSPOT_URL }}
  CS_TOOLS_THOUGHTSPOT__USERNAME: ${{ secrets.DEV_THOUGHTSPOT_USERNAME }}
  CS_TOOLS_THOUGHTSPOT__SECRET_KEY: ${{ secrets.DEV_THOUGHTSPOT_SECRET_KEY }}

  TS_ENV_NAME: ts-dev
  TS_SOURCE_ORG_ID: 1432393443
  TS_OBJECT_TAG: version-controlled
  TS_COMMIT_MESSAGE: "AUTOMATED >> TS-CI '${{ github.event.workflow }}' @ ${{ github.event.repository.updated_at }}"

jobs:
  run_commit_api: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ts-dev branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TS_ENV_NAME }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install CS Tools
        run: |
          pip install "cs_tools[cli] @ https://github.com/thoughtspot/cs_tools/archive/${{ env.CS_TOOLS_COMMIT }}.zip"

      - name: Run the GIT COMMIT command
        run: |
          cs_tools tools git branches commit \
            --tag "${{ env.TS_OBJECT_TAG }}" \
            --comment "${{ env.TS_COMMIT_MESSAGE }}" \
            --org "${{ env.TS_SOURCE_ORG_ID }}" \
            --config "ENV:${{ env.TS_ENV_NAME }}" \
            --no-check