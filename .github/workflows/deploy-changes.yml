name: Deploy Changes
on:
  workflow_dispatch:
jobs:
  run_deploy_api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install dependencies
        run: pip install -r requirements.txt || pip install requests pandas python-dotenv
      - name: Run deploy.py
        run: python deploy.py